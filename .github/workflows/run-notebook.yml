name: Executar notebook BAT

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  API_TOKEN: ${{ secrets.API_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  MEU_SALDO_BAT: ${{ secrets.MEU_SALDO_BAT }}
  PRECO_MINIMO_BAT: ${{ secrets.PRECO_MINIMO_BAT }}
  PRECO_MAXIMO_BAT: ${{ secrets.PRECO_MAXIMO_BAT }}

jobs:
  run-bat-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter

      - name: Executar notebook
        env:
          GITHUB_ACTIONS: "true"
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MEU_SALDO_BAT: ${{ secrets.MEU_SALDO_BAT }}
          PRECO_MINIMO_BAT: ${{ secrets.PRECO_MINIMO_BAT }}
          PRECO_MAXIMO_BAT: ${{ secrets.PRECO_MAXIMO_BAT }}
        run: |
          jupyter nbconvert --to notebook --execute bat_tracker.ipynb --output executed_bat_tracker.ipynb
